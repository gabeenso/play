name: Daily Briefing Update

on:
  schedule:
    # Runs at 22:00 UTC = ~9am Sydney (AEST/AEDT)
    - cron: '0 22 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        run: python generate_briefing.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html market_data.json
          git diff --staged --quiet || git commit -m "chore: daily briefing update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
